<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>親のストレス診断</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top Screen -->
    <div id="screen-top" class="screen active">
        <div class="container">
            <div class="hero-card">
                <h1 class="title">親のストレス<br>診断</h1>
                <p class="subtitle">
                    日々の子育ての中で、どのくらいストレスを<br>
                    抱えているかを振り返るためのツールです。
                </p>
                <ul class="intro-list">
                    <li>15の質問に答えるだけ</li>
                    <li>約3分で完了します</li>
                    <li>ストレスのやわらげ方をお伝えします</li>
                </ul>
                <button class="btn-primary" id="btn-start">診断を始める</button>
            </div>
        </div>
    </div>

    <!-- Quiz Screen -->
    <div id="screen-quiz" class="screen">
        <div class="container">
            <div class="quiz-header">
                <h2 class="quiz-title">ストレス診断チェック</h2>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <p class="progress-text" id="progress-text">0 / 15 回答済み</p>
            </div>
            <div id="questions-container"></div>
            <button class="btn-primary btn-submit" id="btn-submit" disabled>結果を見る</button>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="screen-result" class="screen">
        <div class="container">
            <h2 class="result-heading">チェック結果</h2>
            <div id="result-content"></div>
            <button class="btn-secondary" id="btn-retry">もう一度チェックする</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
