<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="子育ての中でのストレスを振り返り、やわらげるヒントを見つけるための簡易診断です。約3分で診断できます。">
    <title>親のストレス診断</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top Screen -->
    <div id="screen-top" class="screen active">
        <div class="container">
            <header class="top-header">
                <span class="logo-icon">🌿</span>
                <h1 class="service-title">親のストレス診断</h1>
                <p class="service-tagline">子育てのしんどさを、言葉にしてみましょう</p>
            </header>

            <main class="top-main">
                <div class="intro-card">
                    <p class="intro-text">
                        日々の子育ての中で、<br>
                        <strong>どのくらいストレスを抱えているか</strong>を<br>
                        振り返るためのツールです。
                    </p>
                    <div class="time-badge">⏱ 約3分で診断できます</div>
                </div>

                <div class="features">
                    <div class="feature-item">
                        <span class="feature-icon">📋</span>
                        <span>全15問の選択式質問</span>
                    </div>
                    <div class="feature-item">
                        <span class="feature-icon">📊</span>
                        <span>5つのカテゴリで傾向を分析</span>
                    </div>
                    <div class="feature-item">
                        <span class="feature-icon">💬</span>
                        <span>ストレスをやわらげるヒントを提案</span>
                    </div>
                </div>

                <button class="btn-primary" id="btn-start">診断を始める</button>

                <p class="disclaimer">
                    ※この診断は医療的な検査ではありません。<br>
                    気づきの参考としてご活用ください。<br>
                    回答内容は外部に送信されません。
                </p>
            </main>
        </div>
    </div>

    <!-- Quiz Screen -->
    <div id="screen-quiz" class="screen">
        <div class="container">
            <div class="question-header">
                <div class="question-counter">
                    <span id="progress-text">1 / 15</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <div id="question-card" class="question-card">
                <p class="question-num" id="q-number">Q1 / 15</p>
                <p class="question-text" id="q-text"></p>
                <div class="options" id="options-container"></div>
            </div>

            <div class="question-navigation">
                <button class="btn-back" id="btn-back" style="visibility:hidden">← 前の問題に戻る</button>
            </div>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="screen-result" class="screen">
        <div class="container">
            <h2 class="result-heading">チェック結果</h2>
            <div id="result-content"></div>
            <button class="btn-secondary" id="btn-retry">もう一度チェックする</button>

            <div class="android-banner">
                <span class="android-banner-icon">🤖</span>
                <div class="android-banner-body">
                    <p class="android-banner-title">Androidアプリ 近日公開予定</p>
                    <p class="android-banner-sub">より便利に使えるアプリを準備中です</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
